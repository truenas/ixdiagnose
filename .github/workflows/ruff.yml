name: ruff

on:
  pull_request:
    types:
      - 'synchronize'
      - 'opened'

jobs:
  ruff:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Lint with ruff
      uses: astral-sh/ruff-action@v4
      with:
        args: check
    - name: Check formatting with ruff
      run: ruff format --check --diff
